services:
  - type: web
    name: btc-predictor
    runtime: python
    buildCommand: |
      apt-get update
      apt-get install -y build-essential python3-dev
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
    plan: free